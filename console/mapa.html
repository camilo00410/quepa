<style>
:root {
  --green: #25D366;
  --yg: #D4F542;
  --night: #0a0a0a;
  --cream: #ffffff;
  --paper: #f3f1ec;
  --ink: #0a0a0a;
  --ink-80: rgba(10,10,10,.80);
  --ink-60: rgba(10,10,10,.60);
  --ink-30: rgba(10,10,10,.30);
  --ink-12: rgba(10,10,10,.12);
  --ink-06: rgba(10,10,10,.06);
  --red: #d94a4a;
  --f-sans: "Manrope", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --f-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body { background: var(--paper); font-family: var(--f-sans); color: var(--ink); -webkit-font-smoothing: antialiased; overflow: hidden; }
h1, h2, h3, p, ul { margin: 0; padding: 0; }
ul { list-style: none; }
a { color: inherit; text-decoration: none; cursor: pointer; }
button { font-family: inherit; cursor: pointer; border: 0; background: none; padding: 0; color: inherit; }
input, select { font-family: inherit; }
[hidden] { display: none !important; }

.console { width: 100vw; height: 100vh; display: grid; grid-template-columns: 232px 1fr; background: var(--paper); overflow: hidden; }
.sidebar { background: var(--night); color: #fff; padding: 20px 16px; display: flex; flex-direction: column; gap: 18px; border-right: 1px solid var(--ink-12); overflow-y: auto; }
.sidebar .brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px; }
.sidebar .brand .word { font-weight: 700; font-size: 19px; letter-spacing: -0.04em; }
.sidebar .brand .tag { font-family: var(--f-mono); font-size: 8.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--yg); background: rgba(212,245,66,.12); border: 1px solid rgba(212,245,66,.3); padding: 3px 7px; border-radius: 999px; font-weight: 600; }
.sidebar .search { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; padding: 9px 12px; display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,.55); font-size: 13px; }
.sidebar .search .kbd { margin-left: auto; font-family: var(--f-mono); font-size: 9.5px; letter-spacing: 0.1em; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); padding: 2px 6px; border-radius: 4px; color: rgba(255,255,255,.7); }
.sidebar .nav-group { display: flex; flex-direction: column; gap: 1px; }
.sidebar .nav-label { font-family: var(--f-mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,.4); margin: 8px 8px 6px; }
.sidebar .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; color: rgba(255,255,255,.75); font-size: 13.5px; font-weight: 500; }
.sidebar .nav-item:hover { background: rgba(255,255,255,.04); color: #fff; }
.sidebar .nav-item.active { background: var(--yg); color: var(--night); font-weight: 700; }
.sidebar .nav-item.active .ico { color: var(--night); opacity: 1; }
.sidebar .nav-item .ico { width: 16px; height: 16px; flex-shrink: 0; opacity: .8; }
.sidebar .nav-item .count { margin-left: auto; font-family: var(--f-mono); font-size: 10px; color: rgba(255,255,255,.5); background: rgba(255,255,255,.04); padding: 1px 7px; border-radius: 999px; font-weight: 600; }
.sidebar .nav-item.active .count { background: var(--night); color: var(--yg); }
.sidebar .nav-item .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px rgba(37,211,102,.18); margin-left: auto; }
.sidebar .user { margin-top: auto; border-top: 1px solid rgba(255,255,255,.1); padding-top: 14px; display: flex; align-items: center; gap: 10px; }
.sidebar .user .av { width: 32px; height: 32px; border-radius: 50%; background: var(--yg); color: var(--night); display: grid; place-items: center; font-weight: 800; font-size: 12px; letter-spacing: -0.02em; }
.sidebar .user .meta { font-size: 12px; line-height: 1.3; overflow: hidden; }
.sidebar .user .meta b { color: #fff; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar .user .meta span { color: rgba(255,255,255,.5); display: block; font-family: var(--f-mono); letter-spacing: 0.1em; font-size: 9px; text-transform: uppercase; }
.sidebar .user .logout { margin-left: auto; color: rgba(255,255,255,.4); }
.sidebar .user .logout:hover { color: var(--yg); }

.main { display: flex; flex-direction: column; height: 100%; overflow: hidden; min-width: 0; }
.topbar { height: 52px; flex-shrink: 0; border-bottom: 1px solid var(--ink-12); background: var(--paper); padding: 0 24px; display: flex; align-items: center; gap: 18px; font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-60); }
.topbar .crumbs { display: flex; align-items: center; gap: 10px; }
.topbar .crumbs b { color: var(--ink); font-weight: 600; }
.topbar .crumbs .sep { opacity: .5; }
.topbar .right { margin-left: auto; display: flex; align-items: center; gap: 18px; }
.topbar .right .env { display: flex; align-items: center; gap: 6px; }
.topbar .right .env .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px rgba(37,211,102,.18); }

.page-head { padding: 22px 28px 14px; display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; border-bottom: 1px solid var(--ink-12); }
.page-head .eyebrow { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-60); margin-bottom: 6px; }
.page-head h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.035em; line-height: 1; display: flex; align-items: baseline; gap: 12px; }
.page-head h1 .count { font-family: var(--f-mono); font-size: 14px; letter-spacing: 0.1em; color: var(--ink-30); font-weight: 500; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 10px; font-size: 13.5px; font-weight: 600; border: 1px solid var(--ink-12); background: var(--cream); color: var(--ink); letter-spacing: -0.005em; }
.btn:hover { background: #fafaf6; }
.btn.primary { background: var(--night); color: var(--yg); border-color: var(--night); }
.btn svg { width: 15px; height: 15px; }

.filters { padding: 12px 28px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--ink-12); flex-wrap: wrap; }
.search-input { flex: 1 1 280px; max-width: 420px; background: var(--cream); border: 1px solid var(--ink-12); border-radius: 10px; padding: 9px 12px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink); }
.search-input input { border: 0; outline: none; flex: 1; background: transparent; font-size: 13px; min-width: 0; }
.search-input input::placeholder { color: var(--ink-30); }
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 8px 10px; border: 1px solid var(--ink-12); border-radius: 999px; background: var(--cream); font-size: 12.5px; font-weight: 500; color: var(--ink); position: relative; min-width: 112px; }
.chip .lbl { color: var(--ink-60); }
.chip select { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-family: inherit; }
.chip .val { color: var(--ink); font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
.chip .car { color: var(--ink-30); font-size: 9px; margin-left: auto; }

.map-layout { flex: 1; min-height: 0; display: grid; grid-template-columns: minmax(320px, 390px) 1fr; background: var(--cream); }
.places-panel { min-height: 0; display: flex; flex-direction: column; border-right: 1px solid var(--ink-12); background: var(--paper); }
.panel-head { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--ink-12); }
.panel-head .label { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-60); }
.panel-head .total { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--ink); background: var(--yg); padding: 2px 8px; border-radius: 999px; font-weight: 700; white-space: nowrap; }
.places-list { overflow: auto; flex: 1; padding: 8px; }
.place-row { width: 100%; display: grid; grid-template-columns: 34px 1fr; gap: 10px; text-align: left; padding: 10px; border-radius: 10px; border: 1px solid transparent; }
.place-row:hover { background: rgba(255,255,255,.75); border-color: var(--ink-06); }
.place-row.active { background: var(--cream); border-color: var(--ink); box-shadow: 0 8px 20px -16px rgba(0,0,0,.35); }
.place-row .thumb { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; background: var(--night); color: var(--yg); font-weight: 800; font-size: 11px; letter-spacing: -0.02em; }
.place-row .meta { min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.place-row .name { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.place-row .sub { font-size: 12px; color: var(--ink-60); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.place-row .tags { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 999px; font-family: var(--f-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; background: var(--ink-06); color: var(--ink-60); font-weight: 600; }
.badge.coords { background: rgba(37,211,102,.12); color: #128c46; }
.badge.search { background: rgba(10,10,10,.08); color: var(--ink-60); }

.map-stage { min-width: 0; min-height: 0; display: grid; grid-template-rows: auto 1fr; background: var(--cream); }
.selected-bar { min-height: 72px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 16px; border-bottom: 1px solid var(--ink-12); }
.selected-main { min-width: 0; }
.selected-main .kicker { font-family: var(--f-mono); font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-60); margin-bottom: 4px; }
.selected-main h2 { font-size: 22px; line-height: 1.1; font-weight: 800; letter-spacing: -0.025em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.selected-main p { margin-top: 5px; color: var(--ink-60); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.map-frame-wrap { min-height: 0; position: relative; background: #dedbd1; }
.map-frame-wrap iframe { width: 100%; height: 100%; border: 0; display: block; background: #dedbd1; }
.state { height: 100%; display: grid; place-items: center; text-align: center; color: var(--ink-60); padding: 24px; }
.state .spinner { width: 28px; height: 28px; border: 2px solid var(--ink-12); border-right-color: var(--ink); border-radius: 50%; animation: spin 720ms linear infinite; margin: 0 auto 12px; }
.state .title { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
.state .small { margin-top: 6px; font-size: 13px; color: var(--ink-60); }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 1050px) {
  .map-layout { grid-template-columns: 330px 1fr; }
  .page-head h1 { font-size: 32px; }
}
@media (max-width: 820px) {
  body { overflow: auto; }
  .console { min-height: 100vh; height: auto; grid-template-columns: 64px 1fr; }
  .sidebar { padding: 16px 8px; }
  .sidebar .brand .word, .sidebar .brand .tag, .sidebar .search span, .sidebar .nav-label, .sidebar .nav-item span, .sidebar .nav-item .count, .sidebar .user .meta { display: none; }
  .sidebar .nav-item { justify-content: center; padding: 10px; }
  .sidebar .user { justify-content: center; }
  .main { min-height: 100vh; }
  .page-head { padding: 18px; align-items: flex-start; flex-direction: column; }
  .filters { padding: 12px 18px; }
  .map-layout { grid-template-columns: 1fr; grid-template-rows: 280px minmax(460px, 62vh); }
  .places-panel { border-right: 0; border-bottom: 1px solid var(--ink-12); }
  .map-stage { min-height: 460px; }
  .selected-bar { align-items: flex-start; flex-direction: column; }
  .selected-main h2, .selected-main p { white-space: normal; }
}
</style>
</head>

    activity: 'Actividad',
    beach: 'Playa',
    viewpoint: 'Mirador',
    bar: 'Bar',
    cafe: 'Café',
    other: 'Otro',
  };

  const state = {
    places: [],
    filtered: [],
    selectedId: null,
    search: '',
    region: '',
    city: '',
    category: '',
  };

  function initials(name) {
    const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
    return (parts[0]?.[0] || 'Q') + (parts[1]?.[0] || '');
  }

  function nameFromEmail(email) {
    const local = (email || '').split('@')[0] || 'staff';
    return local.split(/[._-]+/).filter(Boolean).map(s => s[0].toUpperCase() + s.slice(1)).join(' ');
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function queryFor(place) {
    if (Number.isFinite(place.lat) && Number.isFinite(place.lng)) return `${place.lat},${place.lng}`;
    return [place.name, place.address, place.city, place.region, 'Colombia'].filter(Boolean).join(', ');
  }

  function embedUrl(place) {
    return `https://maps.google.com/maps?q=${encodeURIComponent(queryFor(place))}&z=15&output=embed`;
  }

  function openUrl(place) {
    return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(queryFor(place))}`;
  }

  function hasCoords(place) {
    return Number.isFinite(place.lat) && Number.isFinite(place.lng);
  }

  function syncFilterLabels() {
    document.getElementById('regionVal').textContent = state.region || 'Todas';
    document.getElementById('cityVal').textContent = state.city || 'Todas';
    document.getElementById('categoryVal').textContent = state.category ? CATEGORY_LABEL[state.category] || state.category : 'Todos';
  }

  async function ensureSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.replace(LOGIN_URL); return null; }
    const user = session.user;
    const displayName = (user.user_metadata && (user.user_metadata.full_name || user.user_metadata.name)) || nameFromEmail(user.email);
    document.getElementById('userName').textContent = displayName;
    document.getElementById('userAvatar').textContent = initials(displayName).toUpperCase();
    return session;
  }

  async function loadPlaces() {
    const { data, error, count } = await sb
      .from('places')
      .select('id, name, category, city, region, address, lat, lng, active, price_range, updated_at', { count: 'exact' })
      .eq('active', true)
      .order('region', { ascending: true })
      .order('city', { ascending: true })
      .order('name', { ascending: true })
      .limit(1000);

    if (error) throw error;
    state.places = data || [];
    document.getElementById('totalCount').textContent = `${(count ?? state.places.length).toLocaleString('es-CO')} activos`;
    document.getElementById('navCount').textContent = (count ?? state.places.length).toLocaleString('es-CO');
    fillFilters();
    applyFilters();
  }

  function fillFilters() {
    const regions = Array.from(new Set(state.places.map(p => p.region).filter(Boolean))).sort();
    const cities = Array.from(new Set(state.places.map(p => p.city).filter(Boolean))).sort();
    const regionSelect = document.getElementById('regionFilter');
    const citySelect = document.getElementById('cityFilter');

    for (const r of regions) {
      const opt = document.createElement('option');
      opt.value = r;
      opt.textContent = r;
      regionSelect.appendChild(opt);
    }

    for (const c of cities) {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      citySelect.appendChild(opt);
    }
  }

  function applyFilters() {
    const s = state.search.trim().toLowerCase();
    state.filtered = state.places.filter(p => {
      if (state.region && p.region !== state.region) return false;
      if (state.city && p.city !== state.city) return false;
      if (state.category && p.category !== state.category) return false;
      if (!s) return true;
      return [p.name, p.category, CATEGORY_LABEL[p.category], p.city, p.region, p.address]
        .filter(Boolean)
        .some(v => String(v).toLowerCase().includes(s));
    });

    document.getElementById('resultCount').textContent = state.filtered.length.toLocaleString('es-CO');
    renderList();

    const current = state.filtered.find(p => p.id === state.selectedId);
    if (current) {
      selectPlace(current.id, false);
    } else if (state.filtered.length) {
      selectPlace(state.filtered[0].id, false);
    } else {
      clearMap();
    }
  }

  function renderList() {
    const list = document.getElementById('placesList');
    if (!state.filtered.length) {
      list.innerHTML = '<div class="state"><div><div class="title">Sin resultados</div><div class="small">Ajusta los filtros.</div></div></div>';
      return;
    }

    list.innerHTML = state.filtered.map(p => {
      const selected = p.id === state.selectedId;
      const badge = hasCoords(p) ? '<span class="badge coords">Coords</span>' : '<span class="badge search">Búsqueda</span>';
      return `
        <button class="place-row ${selected ? 'active' : ''}" data-id="${escapeHtml(p.id)}" type="button">
          <span class="thumb">${escapeHtml(initials(p.name).toUpperCase())}</span>
          <span class="meta">
            <span class="name">${escapeHtml(p.name)}</span>
            <span class="sub">${escapeHtml([p.city, p.region].filter(Boolean).join(' · ') || '—')}</span>
            <span class="tags">
              <span class="badge">${escapeHtml(CATEGORY_LABEL[p.category] || p.category || 'Otro')}</span>
              ${badge}
            </span>
          </span>
        </button>`;
    }).join('');
  }

  function selectPlace(id, scroll = true) {
    const place = state.places.find(p => p.id === id);
    if (!place) return;
    state.selectedId = place.id;
    document.getElementById('selectedKicker').textContent = `${CATEGORY_LABEL[place.category] || place.category || 'Lugar'} · ${hasCoords(place) ? 'Coordenadas' : 'Google search'}`;
    document.getElementById('selectedName').textContent = place.name || '—';
    document.getElementById('selectedMeta').textContent = [place.address, place.city, place.region].filter(Boolean).join(' · ') || '—';
    document.getElementById('openMapsBtn').href = openUrl(place);
    document.getElementById('editBtn').href = `lugar.html?id=${encodeURIComponent(place.id)}`;

    const mapFrame = document.getElementById('mapFrame');
    const mapState = document.getElementById('mapState');
    mapState.hidden = false;
    mapFrame.src = embedUrl(place);
    mapFrame.onload = () => { mapState.hidden = true; };

    renderList();
    if (scroll) {
      const row = document.querySelector(`.place-row[data-id="${CSS.escape(place.id)}"]`);
      row?.scrollIntoView({ block: 'nearest' });
    }
  }

  function clearMap() {
    state.selectedId = null;
    document.getElementById('selectedKicker').textContent = 'Google Maps';
    document.getElementById('selectedName').textContent = '—';
    document.getElementById('selectedMeta').textContent = '—';
    document.getElementById('openMapsBtn').removeAttribute('href');
    document.getElementById('editBtn').href = 'lugares.html';
    document.getElementById('mapFrame').removeAttribute('src');
    document.getElementById('mapState').innerHTML = '<div><div class="title">Sin resultados</div></div>';
    document.getElementById('mapState').hidden = false;
  }

  function wire() {
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.replace(LOGIN_URL);
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      state.search = e.target.value;
      applyFilters();
    });

    document.getElementById('regionFilter').addEventListener('change', (e) => {
      state.region = e.target.value;
      syncFilterLabels();
      applyFilters();
    });

    document.getElementById('cityFilter').addEventListener('change', (e) => {
      state.city = e.target.value;
      syncFilterLabels();
      applyFilters();
    });

    document.getElementById('categoryFilter').addEventListener('change', (e) => {
      state.category = e.target.value;
      syncFilterLabels();
      applyFilters();
    });

    document.getElementById('placesList').addEventListener('click', (e) => {
      const row = e.target.closest('.place-row[data-id]');
      if (!row) return;
      selectPlace(row.dataset.id);
    });
  }

  (async function boot() {
    const session = await ensureSession();
    if (!session) return;
    wire();
    try {
      await loadPlaces();
    } catch (error) {
      document.getElementById('placesList').innerHTML = `<div class="state"><div><div class="title">No pudimos cargar</div><div class="small">${escapeHtml(error.message || 'Error')}</div></div></div>`;
      document.getElementById('mapState').innerHTML = '<div><div class="title">Sin datos</div></div>';
    }
  })();
})();
</script>
</body>
</html>
